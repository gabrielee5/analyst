<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        /* Academic template overrides */
        @page {
            size: A4;
            margin: 25mm 20mm 25mm 20mm;
            background: var(--bg);

            @bottom-center {
                content: counter(page);
                font-family: var(--font-sans);
                font-size: 8pt;
                color: var(--text-muted);
            }
        }

        @page :first {
            @bottom-center { content: none; }
        }

        body {
            font-size: 10pt;
            line-height: 1.6;
        }

        /* Academic header */
        .academic-header {
            text-align: center;
            padding: 40pt 0 30pt 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24pt;
            page-break-after: avoid;
        }

        .academic-header .logo {
            width: 30pt;
            height: 30pt;
            opacity: 0.5;
            margin: 0 auto 16pt auto;
        }

        .academic-header .title {
            font-family: var(--font-body);
            font-size: 18pt;
            font-weight: 700;
            color: var(--text-bright);
            line-height: 1.3;
            margin-bottom: 10pt;
        }

        .academic-header .author {
            font-family: var(--font-sans);
            font-size: 9pt;
            color: var(--text-muted);
            margin-bottom: 4pt;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .academic-header .date {
            font-family: var(--font-sans);
            font-size: 9pt;
            color: var(--text-muted);
        }

        /* Abstract */
        .abstract {
            margin: 0 30pt 24pt 30pt;
            padding: 12pt 0;
            border-bottom: 1px solid var(--border);
        }

        .abstract h3 {
            font-family: var(--font-sans);
            font-size: 8pt;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin: 0 0 6pt 0;
        }

        .abstract p {
            font-size: 9.5pt;
            color: var(--text-muted);
            margin: 0;
        }

        /* Numbered sections */
        .academic-content {
            counter-reset: section;
        }

        .academic-content h2 {
            counter-increment: section;
            font-size: 13pt;
            color: var(--text-bright);
            border-bottom: 1px solid var(--border);
            margin-top: 24pt;
        }

        .academic-content h2::before {
            content: counter(section) ". ";
            font-weight: 700;
            color: var(--text-muted);
        }

        .academic-content h3 {
            font-size: 11pt;
            color: var(--text);
        }

        /* Bibliography */
        .bibliography {
            margin-top: 30pt;
            padding-top: 12pt;
            border-top: 1px solid var(--border);
        }

        .bibliography h2 {
            font-size: 13pt;
            color: var(--text-bright);
        }

        .bibliography h2::before {
            content: none;
        }

        .bibliography ol {
            font-size: 9pt;
            line-height: 1.5;
            color: var(--text-muted);
        }

        /* Tighter table style */
        th, td {
            padding: 6pt 10pt;
            font-size: 9pt;
        }

        /* Hide first H1 */
        .academic-content h1:first-child {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Academic Header -->
    <div class="academic-header">
        <img class="logo" src="assets/logo.png" alt="gabrielefabietti.xyz">
        <div class="title">{{ title }}</div>
        <div class="author">gabrielefabietti.xyz</div>
        {% if date %}
        <div class="date">{{ date }}</div>
        {% endif %}
    </div>

    <!-- Abstract -->
    {% if subtitle %}
    <div class="abstract">
        <h3>Abstract</h3>
        <p>{{ subtitle }}</p>
    </div>
    {% endif %}

    <!-- Table of Contents -->
    {% if toc %}
    <div class="toc-page" style="margin-bottom: 24pt;">
        <h3 style="font-family: var(--font-sans); font-size: 8pt; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 8pt;">Contents</h3>
        <div class="toc" style="font-size: 9.5pt;">
            {{ toc }}
        </div>
    </div>
    {% endif %}

    <!-- Report Content -->
    <div class="academic-content">
        {{ content }}
    </div>

    <!-- Footer -->
    <div class="page-footer">
        gabrielefabietti.xyz &mdash; Research Division
    </div>

</body>
</html>
