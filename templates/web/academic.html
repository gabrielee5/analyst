{% extends "base.html" %}

{% block content %}
    <article>
        <!-- Academic Header -->
        <header class="report-header report-header--centered">
            <div class="header-top-row">
                <div class="sys-label">Academic Paper</div>
                {% if date %}<div class="header-date">{{ date }}</div>{% endif %}
            </div>
            <h1 class="title">{{ title }}</h1>
            {% if pdf_url %}
            <a href="{{ pdf_url }}" class="pdf-download">&#x2913; Download PDF</a>
            {% endif %}
        </header>

        <!-- Abstract -->
        {% if subtitle %}
        <div class="abstract">
            <h3>Abstract</h3>
            <p>{{ subtitle }}</p>
        </div>
        {% endif %}

        <!-- Table of Contents -->
        {% if toc %}
        <aside class="toc-section">
            <div class="toc-label">Contents</div>
            <div class="toc">
                {{ toc }}
            </div>
        </aside>
        {% endif %}

        <!-- Report Content -->
        <div class="content academic-content">
            {{ content }}
        </div>
    </article>
{% endblock %}
