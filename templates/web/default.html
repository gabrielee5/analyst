{% extends "base.html" %}

{% block content %}
    <article>
        <!-- Report Header -->
        <header class="report-header">
            <div class="header-top-row">
                <div class="sys-label">Research Report</div>
                {% if date %}<div class="header-date">{{ date }}</div>{% endif %}
            </div>
            <h1 class="title">{{ title }}</h1>
            {% if subtitle %}
            <p class="subtitle">{{ subtitle }}</p>
            {% endif %}
            {% if pdf_url %}
            <a href="{{ pdf_url }}" class="pdf-download">&#x2913; Download PDF</a>
            {% endif %}
        </header>

        <!-- Table of Contents -->
        {% if toc %}
        <aside class="toc-section">
            <div class="toc-label">Contents</div>
            <div class="toc">
                {{ toc }}
            </div>
        </aside>
        {% endif %}

        <!-- Report Content -->
        <div class="content">
            {{ content }}
        </div>
    </article>
{% endblock %}
