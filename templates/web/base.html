<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — gabrielefabietti.xyz</title>
    <meta name="description" content="{{ subtitle }}">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="{{ subtitle }}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="gabrielefabietti.xyz">
    <link rel="stylesheet" href="/assets/style.css">
    {% block head %}{% endblock %}
</head>
<body class="site-body">

    <nav class="site-nav">
        <div class="nav-inner">
            <a href="/" class="logo-link">gabrielefabietti.xyz</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-left">gabrielefabietti.xyz</div>
            <div class="footer-right">
                <a href="/">Archive</a>
                <a href="/about/">About</a>
            </div>
        </div>
    </footer>

    <button class="back-to-top" aria-label="Back to top" onclick="window.scrollTo({top:0})">&#x2191;</button>
    <script>
    (function(){
        var btn=document.querySelector('.back-to-top');
        var shown=false;
        window.addEventListener('scroll',function(){
            var show=window.scrollY>600;
            if(show!==shown){shown=show;btn.classList.toggle('visible',show);}
        },{passive:true});
    })();
    </script>

</body>
</html>
