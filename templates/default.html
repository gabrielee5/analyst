<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <!-- Cover Page -->
    <div class="cover">
        <img class="logo" src="assets/logo.png" alt="Fabietti.xyz">
        <div class="sys-label">Research Report</div>
        <div class="title">{{ title }}</div>
        {% if subtitle %}
        <div class="subtitle">{{ subtitle }}</div>
        {% endif %}
        <div class="meta-block">
            {% if date %}
            <div class="meta-item">
                <span class="meta-label">Date</span>
                <span class="meta-value">{{ date }}</span>
            </div>
            {% endif %}
            <div class="meta-item">
                <span class="meta-label">Prepared by</span>
                <span class="meta-value">Fabietti.xyz</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Classification</span>
                <span class="meta-value">Internal</span>
            </div>
        </div>
    </div>

    <!-- Table of Contents -->
    {% if toc %}
    <div class="toc-page">
        <h2>Contents</h2>
        <div class="toc">
            {{ toc }}
        </div>
    </div>
    {% endif %}

    <!-- Report Content -->
    <div class="content">
        {{ content }}
    </div>

    <!-- Footer -->
    <div class="page-footer">
        Fabietti.xyz &mdash; Trasformiamo complessit&agrave; in sistemi che funzionano
    </div>

</body>
</html>
